<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parametri URL</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 1rem 1.25rem;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 0.9375rem;
            line-height: 1.5;
            color: #1a1a1a;
            background: #f8f9fa;
        }
        section + section {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #e2e4e8;
        }
        h1, h2 {
            margin: 0 0 0.75rem;
            font-size: 1.125rem;
            font-weight: 600;
        }
        .empty {
            color: #666;
            font-style: italic;
        }
        dl {
            margin: 0;
            display: grid;
            gap: 0.5rem;
        }
        dt {
            margin: 0.5rem 0 0;
            padding: 0.5rem 0.75rem 0.25rem;
            font-weight: 600;
            color: #444;
            word-break: break-word;
            background: #fff;
            border: 1px solid #e2e4e8;
            border-bottom: none;
            border-radius: 6px 6px 0 0;
        }
        dt:first-child { margin-top: 0; }
        dd {
            margin: 0 0 0.5rem;
            padding: 0.25rem 0.75rem 0.5rem;
            word-break: break-word;
            background: #fff;
            border: 1px solid #e2e4e8;
            border-top: none;
            border-radius: 0 0 6px 6px;
        }
        dd:last-child { margin-bottom: 0; }
        .values {
            list-style: none;
            margin: 0;
            padding: 0;
        }
        .values li + li {
            margin-top: 0.25rem;
            padding-top: 0.25rem;
            border-top: 1px dashed #e2e4e8;
        }
        #consent-output {
            margin: 0;
            padding: 0.75rem;
            background: #fff;
            border: 1px solid #e2e4e8;
            border-radius: 6px;
            white-space: pre-wrap;
            word-break: break-word;
            font-family: ui-monospace, monospace;
            font-size: 0.8125rem;
        }
    </style>
</head>
<body>
    <section>
        <h1>Parametri URL</h1>
        <div id="url-output" class="empty">Nessun parametro nella query string.</div>
    </section>

    <section>
        <h2>IUB_CONSENT</h2>
        <pre id="consent-output" class="empty">In attesa di postMessage…</pre>
    </section>

    <script>
        (function () {
            function formatValue(value) {
                if (value === null) return 'null';
                if (value === undefined) return '';
                if (typeof value === 'object') {
                    try {
                        return JSON.stringify(value, null, 2);
                    } catch (e) {
                        return String(value);
                    }
                }
                return String(value);
            }

            function renderUrlParams() {
                var params = new URLSearchParams(window.location.search);
                var output = document.getElementById('url-output');

                if (!params.toString()) {
                    return;
                }

                var dl = document.createElement('dl');
                dl.setAttribute('aria-label', 'Parametri URL');

                var seen = new Set();
                params.forEach(function (value, key) {
                    if (seen.has(key)) return;
                    seen.add(key);

                    var all = params.getAll(key);
                    var dt = document.createElement('dt');
                    dt.textContent = key;
                    dl.appendChild(dt);

                    if (all.length > 1) {
                        var ul = document.createElement('ul');
                        ul.className = 'values';
                        all.forEach(function (v) {
                            var li = document.createElement('li');
                            li.textContent = v;
                            ul.appendChild(li);
                        });
                        var dd = document.createElement('dd');
                        dd.appendChild(ul);
                        dl.appendChild(dd);
                    } else {
                        var dd = document.createElement('dd');
                        dd.textContent = all[0];
                        dl.appendChild(dd);
                    }
                });

                output.replaceWith(dl);
            }

            function extractConsentValue(data) {
                if (data && typeof data === 'object' && 'value' in data) {
                    return data.value;
                }
                return data;
            }

            function renderConsent(value) {
                var output = document.getElementById('consent-output');
                output.className = '';
                output.textContent = formatValue(value);
            }

            window.addEventListener('message', function (event) {
                var data = event.data;

                if (typeof data === 'string') {
                    try {
                        data = JSON.parse(data);
                    } catch (e) {
                        if (data !== 'IUB_CONSENT') return;
                        renderConsent(data);
                        return;
                    }
                }

                if (data === 'IUB_CONSENT') {
                    renderConsent(data);
                    return;
                }

                if (!data || typeof data !== 'object') return;

                var eventName = data.event || data.type || data.name;
                if (eventName !== 'IUB_CONSENT') return;

                renderConsent(extractConsentValue(data));
            });

            renderUrlParams();
        })();
    </script>
</body>
</html>
