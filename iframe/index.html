<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parametri URL</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 1rem 1.25rem;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 0.9375rem;
            line-height: 1.5;
            color: #1a1a1a;
            background: #f8f9fa;
        }
        section + section {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #e2e4e8;
        }
        h1, h2 {
            margin: 0 0 0.75rem;
            font-size: 1.125rem;
            font-weight: 600;
        }
        .empty {
            color: #666;
            font-style: italic;
        }
        dl {
            margin: 0;
            display: grid;
            gap: 0.5rem;
        }
        dt {
            margin: 0.5rem 0 0;
            padding: 0.5rem 0.75rem 0.25rem;
            font-weight: 600;
            color: #444;
            word-break: break-word;
            background: #fff;
            border: 1px solid #e2e4e8;
            border-bottom: none;
            border-radius: 6px 6px 0 0;
        }
        dt:first-child { margin-top: 0; }
        dd {
            margin: 0 0 0.5rem;
            padding: 0.25rem 0.75rem 0.5rem;
            word-break: break-word;
            background: #fff;
            border: 1px solid #e2e4e8;
            border-top: none;
            border-radius: 0 0 6px 6px;
        }
        dd:last-child { margin-bottom: 0; }
        .values {
            list-style: none;
            margin: 0;
            padding: 0;
        }
        .values li + li {
            margin-top: 0.25rem;
            padding-top: 0.25rem;
            border-top: 1px dashed #e2e4e8;
        }
        #consent-output {
            margin: 0;
            padding: 0.75rem;
            background: #fff;
            border: 1px solid #e2e4e8;
            border-radius: 6px;
            white-space: pre-wrap;
            word-break: break-word;
            font-family: ui-monospace, monospace;
            font-size: 0.8125rem;
        }
    </style>
</head>
<body>
    <section>
        <h1>Parametri URL</h1>
        <div id="url-output" class="empty">Nessun parametro nella query string.</div>
    </section>

    <section>
        <h2>AME_CONSENT</h2>
        <pre id="consent-output" class="empty">In attesa di postMessage…</pre>
    </section>

    <script>
        // stampo i parametri per vedere che passano correttamente
        // solo per la demo
        (function () {
            function formatValue(value) {
                if (value === null) return 'null';
                if (value === undefined) return '';
                if (typeof value === 'object') {
                    try {
                        return JSON.stringify(value, null, 2);
                    } catch (e) {
                        return String(value);
                    }
                }
                return String(value);
            }

            function renderUrlParams() {
                var params = new URLSearchParams(window.location.search);
                var output = document.getElementById('url-output');

                if (!params.toString()) {
                    return;
                }

                var dl = document.createElement('dl');
                dl.setAttribute('aria-label', 'Parametri URL');

                var seen = new Set();
                params.forEach(function (value, key) {
                    if (seen.has(key)) return;
                    seen.add(key);

                    var all = params.getAll(key);
                    var dt = document.createElement('dt');
                    dt.textContent = key;
                    dl.appendChild(dt);

                    if (all.length > 1) {
                        var ul = document.createElement('ul');
                        ul.className = 'values';
                        all.forEach(function (v) {
                            var li = document.createElement('li');
                            li.textContent = v;
                            ul.appendChild(li);
                        });
                        var dd = document.createElement('dd');
                        dd.appendChild(ul);
                        dl.appendChild(dd);
                    } else {
                        var dd = document.createElement('dd');
                        dd.textContent = all[0];
                        dl.appendChild(dd);
                    }
                });

                output.replaceWith(dl);
            }
            renderUrlParams();
        })();

        (function () { // gestione del consenso con Google Analytics a partire dal parent
            
            window.dataLayer = window.dataLayer || [];
            function gtag() { dataLayer.push(arguments); }

            // array di origin dei parent consentiti
            var PARENT_ORIGINS = ["https://www.smartworld.it", "https://www.giallozafferano.it"];

            // Passo 1: default denied, in attesa del messaggio dal parent
            gtag("consent", "default", {
                ad_storage:              "denied",
                ad_user_data:            "denied",
                ad_personalization:      "denied",
                analytics_storage:       "denied",
                functionality_storage:   "denied",
                personalization_storage: "denied",
                security_storage:        "granted",
                wait_for_update: 1500
            });

            // Passo 2: ricevi il consenso dal parent
            window.addEventListener("message", function (e) {
                if (!PARENT_ORIGINS.includes(e.origin)) return;
                var data = e.data;
                if (!data || data.type !== "AME_CONSENT" || !data.consentMode) return;

                gtag("consent", "update", data.consentMode);

                /// solo per la demo
                // stampa il consenso nell'output per la demo
                var output = document.getElementById('consent-output');
                output.className = '';
                output.textContent = data.consentMode;
                // fine solo per la demo

                // Disponibile per altri usi nell'iframe
                window.AME_CONSENT_CACHE = data;
                window.dispatchEvent(new CustomEvent("ameConsentReceived", { detail: data }));
            });

            // Passo 3: handshake — chiede snapshot al parent se già pronto
            try {
                parent.postMessage({ type: "AME_CONSENT_REQUEST", v: 1 }, PARENT_ORIGIN);
            } catch (err) { /* parent non raggiungibile */ }

        })();

    </script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXX"></script>
    <script>
        gtag("js", new Date());
        gtag("config", "G-XXXXXXXX");
    </script>    
</body>
</html>
